name: CI

# The cross-platform build matrix is EXPENSIVE (macOS is billed 10x, Windows 2x
# on GitHub-hosted runners) and largely redundant per-PR: every PR to main
# already runs the real suite cheaply on Linux via `test` (sandbox.yml) plus
# `gitleaks` (secret-scan.yml). So the full matrix runs only where a green
# cross-platform picture actually matters — release/** branches and v* tags —
# plus manual dispatch. It does NOT run on main pushes/PRs. The release flow
# (scripts/release.sh) opens each release as a chore PR on a release/v<version>
# branch, which fires this workflow before the release is merged + published.
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  pull_request:
    branches: ['release/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions: {}
    defaults:
      run:
        working-directory: apps/cli
    strategy:
      # Run every OS x node combo to completion so a single platform failure
      # doesn't mask the others — we want the full cross-platform picture.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]
    # Runs pre-release only (release/** branches + v* tags + manual dispatch),
    # so this is the last cross-platform gate before a version ships. None of
    # these legs are required on main PRs — the main-protection ruleset gates
    # merges on the cheap `test` + `gitleaks` checks instead.

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --ignore-scripts

      # The daemon integration test (#568) spawns the REAL daemon, which loads
      # node-pty (@homebridge/node-pty-prebuilt-multiarch). That package ships
      # prebuilt binaries only for Linux; macOS/Windows fetch (or compile)
      # pty.node via its own install script. bun does not run that script here
      # (not even without --ignore-scripts, as of bun 1.3.x), so build this one
      # native dep explicitly — otherwise the daemon crashes on macOS/Windows
      # (Linux uses the shipped prebuild and stayed green, masking the break;
      # the matrix runs only on release/** + v*, so it never showed on PRs). The
      # package's install script prefers a prebuilt download and falls back to a
      # node-gyp compile, so it self-heals on runners with no matching prebuilt.
      - name: Build node-pty native binary
        shell: bash
        run: cd node_modules/@homebridge/node-pty-prebuilt-multiarch && npm run install

      # --with-deps installs OS-level libs for headless Chromium and only works
      # on Linux (apt). macOS and Windows ship the needed libs already.
      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright browsers (macOS/Windows)
        if: runner.os != 'Linux'
        run: bunx playwright install chromium

      - name: Build
        run: bun run build

      - name: Test
        # Run the suite serially in the release matrix. Several resource/timing-
        # sensitive tests race under the fork pool's parallelism on loaded CI
        # runners — the real-tmux integration teardown (`waitForPanes` sees the
        # split pane briefly survive) and the scheduler-timer window (a 1300ms
        # fire missed under CPU load) — flaking the release gate. This matrix is
        # release-only and infrequent, so reliability beats the parallel speedup.
        # (The per-PR gate keeps its fast sharded run plus a dedicated serial
        # tmux job — see tests.yml.) One flag, cross-platform-safe.
        run: bun run test -- --no-file-parallelism

  # No CI publish job — publishing happens locally on macOS via
  # `scripts/release.sh <version> --apply`.
  #
  # The npm package bundles `dist/lib/secrets/Agents CLI.app` (package.json
  # `files`), a native macOS keychain helper that must be compiled with swiftc,
  # codesigned with the "Developer ID Application" identity, and notarized via
  # `xcrun notarytool` (see scripts/build-keychain-helper.sh). `prepack`
  # (scripts/verify-keychain-helper.sh) refuses to pack unless that signed
  # binary matches the pinned sha in scripts/Agents CLI.app.sha256.
  #
  # GitHub-hosted and the phnx-labs self-hosted runners are Linux — they have no
  # swiftc/codesign/notarytool and cannot produce the helper, so a CI publish
  # would either fail at prepack or ship a macOS-broken tarball. Releasing stays
  # on a macOS machine that holds the signed helper and the npm token. The build
  # job above still runs on tag pushes as a sanity check.
