name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history scan on Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the scheduled run audits the whole tree.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required by gitleaks-action v2 for PR scans (posts findings as PR comments).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos; pulls a license token from secrets for private repos.
          # If unset, the action runs in unlicensed mode and prints a warning.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Fail the job on any leak; SOC 2 evidence requires a hard gate, not a warning.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
