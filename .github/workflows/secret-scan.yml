name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history scan on Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the scheduled run audits the whole tree.
          fetch-depth: 0

      # gitleaks-action requires GITLEAKS_LICENSE for org-owned repos and
      # exits hard when it's missing. Two PR classes can't read that secret and
      # so always fail here: (1) fork PRs (forks can't read org secrets), and
      # (2) Dependabot PRs (runs use the restricted Dependabot secret store, not
      # the repo/org store, so secrets.GITLEAKS_LICENSE is empty). Skip both;
      # the post-merge scan on main re-scans the same commits with the license.
      - name: Determine if scan should be skipped
        id: fork
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.fork.outputs.is_fork != 'true'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required by gitleaks-action v2 for PR scans (posts findings as PR comments).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos; pulls a license token from secrets for private repos.
          # If unset, the action runs in unlicensed mode and prints a warning.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Fail the job on any leak; SOC 2 evidence requires a hard gate, not a warning.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
