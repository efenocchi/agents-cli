name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history scan on Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  # gitleaks-action v2 lists PR commits and posts findings as PR comments.
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scheduled run audits the whole tree.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          # Required by gitleaks-action v2 for PR scans (posts findings as PR comments).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos; pulls a license token from secrets for private repos.
          # If unset, the action runs in unlicensed mode and prints a warning.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Fail the job on any leak; SOC 2 evidence requires a hard gate, not a warning.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
