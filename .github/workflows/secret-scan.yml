name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-history scan on Mondays at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history so the scheduled run audits the whole tree.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          # Required by gitleaks-action v2 for PR scans (posts findings as PR comments).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos; pulls a license token from secrets for private repos.
          # If unset, the action runs in unlicensed mode and prints a warning.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          # Fail the job on any leak; SOC 2 evidence requires a hard gate, not a warning.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
