name: Tests

# Per-PR test gate on GitHub-hosted Linux runners. One of the two required checks
# (with gitleaks). The shard-safe suite is split three ways with `vitest --shard`;
# real tmux integration runs serially in its own job, while type-checking uses a
# separate parallel lane. A small aggregate `test` job gates on all of them so
# the required-check context stays named `test`
# (branch protection + scripts/release.sh EXPECTED_CHECKS depend on that name --
# don't rename it). The full cross-platform matrix lives in ci.yml, cost-gated to
# release/** branches and v* tags.
#
# Tool versions are NOT pinned here -- setup-bun reads them from package.json.

on:
  pull_request:
    branches: ['main', 'release/**']

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Type-check (via build) in parallel with the test shards. No test imports from
  # dist/, so the build never needed to precede the suite -- pulling it onto its
  # own lane takes it off the test critical path while still gating types.
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('apps/cli/bun.lock') }}
          restore-keys: bun-cache-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build

  # The shard-safe suite, split three ways. Real tmux tests have their own serial
  # job below because they share HOME-scoped tmux metadata and hooks.
  test-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('apps/cli/bun.lock') }}
          restore-keys: bun-cache-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:shardable -- --shard=${{ matrix.shard }}/3

  test-tmux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('apps/cli/bun.lock') }}
          restore-keys: bun-cache-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run test:tmux

  # Aggregate gate: the ONLY required-check context here. Runs after typecheck,
  # every shard, and real tmux integration regardless of their outcome
  # (`if: always()`) and fails unless ALL succeeded. A matrix job's `result` is
  # `success` only when every leg passed.
  test:
    needs: [typecheck, test-shard, test-tmux]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gate on typecheck + all test shards
        run: |
          echo "typecheck:  ${{ needs.typecheck.result }}"
          echo "test-shard: ${{ needs.test-shard.result }}"
          echo "test-tmux:  ${{ needs.test-tmux.result }}"
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "::error::typecheck failed"; exit 1
          fi
          if [ "${{ needs.test-shard.result }}" != "success" ]; then
            echo "::error::one or more test shards failed"; exit 1
          fi
          if [ "${{ needs.test-tmux.result }}" != "success" ]; then
            echo "::error::real tmux integration tests failed"; exit 1
          fi
          echo "typecheck + all shards + real tmux integration green"
