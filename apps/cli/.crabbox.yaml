# Crabbox config for agents-cli's remote test runs (scripts/sandbox.sh).
# `profile` is a stable label: scripts/sandbox.sh acquires a box by this profile
# (never by slug, which is ephemeral), so a reaped box is transparently replaced
# by its successor. A dedicated profile keeps this repo's warm pool separate from
# other repos' boxes instead of colliding on the `default` fallback.
profile: agents-cli
class: cpx62
sync:
  exclude:
    - .git
    - node_modules
    - dist
    - .bun
    - coverage
    - .agents/worktrees
