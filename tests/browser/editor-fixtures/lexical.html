<!DOCTYPE html>
<html>
<body>
<div id="editor" contenteditable="true" role="textbox" aria-label="Editor"
     data-lexical-editor="true"><p></p></div>
<script>
document.getElementById('editor').addEventListener('beforeinput', function(e) {
  e.preventDefault();
  var p = this.querySelector('p');
  if (e.inputType === 'insertText' && e.data) {
    p.textContent += e.data;
  } else if (e.inputType === 'deleteContentBackward') {
    p.textContent = '';
  }
});
</script>
</body>
</html>
